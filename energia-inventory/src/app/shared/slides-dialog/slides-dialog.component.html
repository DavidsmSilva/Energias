<h2 mat-dialog-title>Acciones</h2>
<mat-dialog-content>
  <div class="slides">
    <div class="slide" *ngFor="let s of slides; let i = index" [class.active]="i === current">
      <h3>{{ s.title }} - {{ s.label }}</h3>
      <p>{{ s.content }}</p>
    </div>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="prev()" [disabled]="slides.length <= 1">Anterior</button>
  <button mat-button (click)="next()" [disabled]="slides.length <= 1">Siguiente</button>
  <button mat-button (click)="close()">Cerrar</button>
</mat-dialog-actions>
