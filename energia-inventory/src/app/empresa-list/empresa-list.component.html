<section class="left-panel">
  <div class="empresas-header">
    <div class="empresas-title">
      <mat-icon class="empresas-icon">business</mat-icon>
      <span>Empresas</span>
    </div>
    <button mat-icon-button color="primary" aria-label="Agregar empresa">
      <mat-icon>add</mat-icon>
    </button>
  </div>
  <div class="title">EMPRESA</div>
  <div class="empresa-list">
    <div class="empresa-item" *ngFor="let e of empresas">
      <span class="empresa-name">{{ e.nombre }}</span>
      <button mat-icon-button (click)="openSlides(e)" aria-label="Abrir diapositivas">
        <mat-icon>more_vert</mat-icon>
      </button>
    </div>
  </div>
</section>
